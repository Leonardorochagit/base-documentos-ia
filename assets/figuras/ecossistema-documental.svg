<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Ecossistema documental com IA</title>
  <desc id="desc">Diagrama visual com quatro camadas: organização, ingestão, consulta e desenvolvimento.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#0f172a">
    <text x="70" y="86" font-size="42" font-weight="700">Base documental com IA</text>
    <text x="70" y="126" font-size="22" fill="#334155">Uma arquitetura em quatro camadas para sair do arquivo solto e chegar à consulta prática.</text>

    <rect x="70" y="180" width="500" height="180" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="100" y="225" font-size="20" font-weight="700" fill="#155e75">01 · Organização</text>
    <text x="100" y="268" font-size="34" font-weight="700">Obsidian · Logseq</text>
    <text x="100" y="315" font-size="22" fill="#475569">Notas, resumos, playbooks, relações</text>

    <rect x="630" y="180" width="500" height="180" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="660" y="225" font-size="20" font-weight="700" fill="#155e75">02 · Ingestão</text>
    <text x="660" y="268" font-size="34" font-weight="700">Docling · MarkItDown</text>
    <text x="660" y="315" font-size="22" fill="#475569">Converter, limpar, estruturar</text>

    <rect x="70" y="410" width="500" height="180" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="100" y="455" font-size="20" font-weight="700" fill="#155e75">03 · Consulta</text>
    <text x="100" y="498" font-size="34" font-weight="700">AnythingLLM · Open WebUI · Khoj</text>
    <text x="100" y="545" font-size="22" fill="#475569">Busca, resumo, linguagem natural</text>

    <rect x="630" y="410" width="500" height="180" rx="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="660" y="455" font-size="20" font-weight="700" fill="#155e75">04 · Desenvolvimento</text>
    <text x="660" y="498" font-size="34" font-weight="700">VS Code · Copilot · Python</text>
    <text x="660" y="545" font-size="22" fill="#475569">Automação, pipelines, aplicações</text>

    <path d="M570 270 H630" stroke="#0891b2" stroke-width="8" stroke-linecap="round"/>
    <path d="M320 360 V410" stroke="#0891b2" stroke-width="8" stroke-linecap="round"/>
    <path d="M880 360 V410" stroke="#0891b2" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
