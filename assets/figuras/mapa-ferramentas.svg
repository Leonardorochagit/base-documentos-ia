<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de ferramentas</title>
  <desc id="desc">Figura comparando organização, ingestão, consulta e desenvolvimento.</desc>
  <rect width="1280" height="760" rx="30" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="80" font-size="40" font-weight="700" fill="#0f172a">Mapa de ferramentas para documentos e IA</text>
    <text x="70" y="118" font-size="21" fill="#475569">Cada grupo resolve uma dor diferente do fluxo documental.</text>

    <rect x="70" y="170" width="1140" height="520" rx="26" fill="#f8fafc" stroke="#e2e8f0"/>

    <line x1="350" y1="210" x2="350" y2="660" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="650" y1="210" x2="650" y2="660" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="940" y1="210" x2="940" y2="660" stroke="#cbd5e1" stroke-width="3"/>

    <text x="140" y="235" font-size="24" font-weight="700" fill="#155e75">Organização</text>
    <text x="430" y="235" font-size="24" font-weight="700" fill="#155e75">Ingestão</text>
    <text x="740" y="235" font-size="24" font-weight="700" fill="#155e75">Consulta</text>
    <text x="1010" y="235" font-size="24" font-weight="700" fill="#155e75">Desenvolvimento</text>

    <g>
      <rect x="110" y="280" width="200" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="140" y="332" font-size="30" font-weight="700" fill="#0f172a">Obsidian</text>
      <text x="140" y="367" font-size="19" fill="#475569">Notas e base viva</text>
    </g>
    <g>
      <rect x="110" y="440" width="200" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="140" y="492" font-size="30" font-weight="700" fill="#0f172a">Logseq</text>
      <text x="140" y="527" font-size="19" fill="#475569">Blocos e estrutura</text>
    </g>

    <g>
      <rect x="400" y="280" width="210" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="435" y="332" font-size="30" font-weight="700" fill="#0f172a">Docling</text>
      <text x="435" y="367" font-size="19" fill="#475569">Conversão robusta</text>
    </g>
    <g>
      <rect x="400" y="440" width="210" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="420" y="492" font-size="28" font-weight="700" fill="#0f172a">MarkItDown</text>
      <text x="420" y="527" font-size="19" fill="#475569">Leve e direto</text>
    </g>

    <g>
      <rect x="700" y="260" width="200" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="730" y="317" font-size="28" font-weight="700" fill="#0f172a">Khoj</text>
    </g>
    <g>
      <rect x="700" y="382" width="200" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="715" y="439" font-size="24" font-weight="700" fill="#0f172a">AnythingLLM</text>
    </g>
    <g>
      <rect x="700" y="504" width="200" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="710" y="561" font-size="24" font-weight="700" fill="#0f172a">Open WebUI</text>
    </g>

    <g>
      <rect x="980" y="280" width="200" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="1020" y="332" font-size="26" font-weight="700" fill="#0f172a">VS Code</text>
      <text x="1020" y="367" font-size="19" fill="#475569">Workspace técnico</text>
    </g>
    <g>
      <rect x="980" y="440" width="200" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="1010" y="492" font-size="28" font-weight="700" fill="#0f172a">Copilot</text>
      <text x="1010" y="527" font-size="19" fill="#475569">Código e apoio</text>
    </g>
  </g>
</svg>
